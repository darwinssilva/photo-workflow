name: Send Trello Reminders

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

permissions:
  contents: write

jobs:
  reminders:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Send Trello reminder emails
        run: ruby bin/send_trello_reminders
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          REMINDER_EMAIL_TO: ${{ secrets.REMINDER_EMAIL_TO }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}

      - name: Commit reminder state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trello_reminders.json || true
          if git diff --cached --quiet; then
            echo "No reminder state changes to commit."
            exit 0
          fi
          git commit -m "Update Trello reminder state"
          git pull --rebase origin main
          git push origin HEAD:main
