name: Send WhatsApp Event Reminders

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write

concurrency:
  group: whatsapp-event-reminder-state
  cancel-in-progress: false

jobs:
  reminders:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update branch before reminders
        run: git pull --ff-only origin main

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Send WhatsApp event reminders
        run: ruby bin/send_whatsapp_event_reminders
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          WHATSAPP_ENABLED: "true"
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}

      - name: Commit WhatsApp reminder state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/whatsapp_event_reminders.json || true
          if git diff --cached --quiet; then
            echo "No WhatsApp reminder state changes to commit."
            exit 0
          fi
          git commit -m "Update WhatsApp reminder state"
          if ! git pull --rebase origin main; then
            ruby script/resolve_json_conflict data/whatsapp_event_reminders.json
            git add data/whatsapp_event_reminders.json
            GIT_EDITOR=true git rebase --continue
          fi
          git push origin HEAD:main
