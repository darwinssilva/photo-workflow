name: Renew Google Calendar Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  renew-watch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Register or renew Google Calendar watch channel
        run: ruby bin/register_google_calendar_watch
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          WEBHOOK_PUBLIC_URL: ${{ secrets.WEBHOOK_PUBLIC_URL }}
          WEBHOOK_SHARED_TOKEN: ${{ secrets.WEBHOOK_SHARED_TOKEN }}
          GOOGLE_WEBHOOK_CHANNEL_ID: ${{ secrets.GOOGLE_WEBHOOK_CHANNEL_ID }}

      - name: Commit webhook state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/google_calendar_webhook_state.json || true
          if git diff --cached --quiet; then
            echo "No webhook state changes to commit."
            exit 0
          fi
          git commit -m "Update Google Calendar webhook state"
          git pull --rebase origin main
          git push origin HEAD:main
